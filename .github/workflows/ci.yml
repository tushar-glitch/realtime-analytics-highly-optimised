name: CI / Build & Push

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  ORG: ${{ github.repository_owner }}

jobs:
  # ── Typecheck + lint ────────────────────────────────────────────────────────
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9.4.0 }
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm turbo typecheck
      - run: pnpm turbo test

  # ── Build SDK + push Docker images (main branch only) ──────────────────────
  build:
    needs: check
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - app: collector
            dockerfile: infra/docker/collector.Dockerfile
          - app: processor
            dockerfile: infra/docker/processor.Dockerfile
          - app: query-api
            dockerfile: infra/docker/query-api.Dockerfile
          - app: dashboard
            dockerfile: infra/docker/dashboard.Dockerfile
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9.4.0 }
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @analytics/browser-sdk build
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push ${{ matrix.app }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          platforms: linux/amd64,linux/arm64   # arm64 = Oracle Cloud A1 Flex
          tags: |
            ${{ env.REGISTRY }}/${{ env.ORG }}/analytics-${{ matrix.app }}:latest
            ${{ env.REGISTRY }}/${{ env.ORG }}/analytics-${{ matrix.app }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Rolling deploy to K3s ───────────────────────────────────────────────────
  deploy:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Pin image tags and apply
        env:
          KUBECONFIG_B64: ${{ secrets.KUBECONFIG_B64 }}
        run: |
          mkdir -p ~/.kube
          echo "$KUBECONFIG_B64" | base64 -d > ~/.kube/config
          cd infra/k8s/base
          kustomize edit set image \
            ghcr.io/${{ env.ORG }}/analytics-collector=ghcr.io/${{ env.ORG }}/analytics-collector:${{ github.sha }} \
            ghcr.io/${{ env.ORG }}/analytics-processor=ghcr.io/${{ env.ORG }}/analytics-processor:${{ github.sha }} \
            ghcr.io/${{ env.ORG }}/analytics-query-api=ghcr.io/${{ env.ORG }}/analytics-query-api:${{ github.sha }} \
            ghcr.io/${{ env.ORG }}/analytics-dashboard=ghcr.io/${{ env.ORG }}/analytics-dashboard:${{ github.sha }}
          cd ../../..
          kubectl apply -k infra/k8s/base
          kubectl rollout status deployment/collector  -n analytics --timeout=120s
          kubectl rollout status deployment/query-api  -n analytics --timeout=120s
          kubectl rollout status deployment/dashboard  -n analytics --timeout=120s
