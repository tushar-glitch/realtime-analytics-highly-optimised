apiVersion: apps/v1
kind: Deployment
metadata:
  name: query-api
  namespace: analytics
spec:
  replicas: 2
  selector:
    matchLabels:
      app: query-api
  template:
    metadata:
      labels:
        app: query-api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "3002"
    spec:
      containers:
        - name: query-api
          image: ghcr.io/your-org/analytics-query-api:latest
          ports:
            - containerPort: 3002
          envFrom:
            - secretRef:
                name: analytics-secrets
          env:
            - name: NODE_ENV
              value: production
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 10
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: query-api
  namespace: analytics
spec:
  selector:
    app: query-api
  ports:
    - name: http
      port: 3002
      targetPort: 3002
