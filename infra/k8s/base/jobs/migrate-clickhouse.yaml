apiVersion: batch/v1
kind: Job
metadata:
  name: clickhouse-migrate
  namespace: analytics
  annotations:
    # Re-run this job manually after deploys:
    # kubectl delete job clickhouse-migrate -n analytics
    # kubectl apply -f infra/k8s/base/jobs/migrate-clickhouse.yaml
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 5
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        # Wait for ClickHouse to be healthy before running migrations
        - name: wait-for-clickhouse
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until wget -qO- http://clickhouse:8123/ping 2>/dev/null | grep -q OK; do
                echo "waiting for clickhouse..."; sleep 3;
              done
      containers:
        - name: migrate
          image: ghcr.io/your-org/analytics-query-api:latest
          command: ["node", "packages/clickhouse/dist/migrate.js"]
          envFrom:
            - secretRef:
                name: analytics-secrets
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
