apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redpanda
  namespace: analytics
spec:
  serviceName: redpanda
  replicas: 1
  selector:
    matchLabels:
      app: redpanda
  template:
    metadata:
      labels:
        app: redpanda
    spec:
      containers:
        - name: redpanda
          image: redpandadata/redpanda:v24.2.18
          command:
            - rpk
            - redpanda
            - start
            - --kafka-addr=0.0.0.0:9092
            - --advertise-kafka-addr=redpanda:9092
            - --pandaproxy-addr=0.0.0.0:8082
            - --schema-registry-addr=0.0.0.0:8081
            - --rpc-addr=0.0.0.0:33145
            - --advertise-rpc-addr=redpanda:33145
            - --mode=dev-container
            - --smp=1
            - --memory=512M
            - --reserve-memory=0M
          ports:
            - containerPort: 9092   # Kafka
            - containerPort: 8082   # HTTP proxy
            - containerPort: 8081   # Schema registry
          volumeMounts:
            - name: data
              mountPath: /var/lib/redpanda/data
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          readinessProbe:
            exec:
              command: [rpk, cluster, info]
            initialDelaySeconds: 15
            periodSeconds: 10
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ReadWriteOnce]
        resources:
          requests:
            storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: redpanda
  namespace: analytics
spec:
  clusterIP: None
  selector:
    app: redpanda
  ports:
    - name: kafka
      port: 9092
    - name: http-proxy
      port: 8082
    - name: schema-registry
      port: 8081
