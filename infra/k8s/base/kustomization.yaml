apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: analytics

resources:
  - namespace.yaml
  - secrets.yaml
  # Stateful backing services
  - clickhouse/statefulset.yaml
  - redpanda/statefulset.yaml
  - redis/deployment.yaml
  # Applications
  - collector/deployment.yaml
  - collector/service.yaml
  - collector/hpa.yaml
  - processor/deployment.yaml
  - processor/keda-scaledobject.yaml
  - query-api/deployment.yaml
  - dashboard/deployment.yaml
  # One-time init jobs (idempotent — safe to re-apply)
  - jobs/init-topics.yaml
  - jobs/migrate-clickhouse.yaml
  # Ingress
  - ingress.yaml
